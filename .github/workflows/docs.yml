name: Build docs website

on:
  pull_request:
    paths:
      - 'docs/pages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: "Dry run. If set to true, the action will not actually publish the pages, but will assemble the artifact."
        default: true
        required: true

permissions:
  id-token: write
  pages: write
  contents: read

env:
  INSTANCE: 'libs-watchdog/lw'
  ARTIFACT: 'webHelpLW2-all.zip'
  DOCKER_VERSION: '243.22562'
  DOKKA_OUTPUT: 'build/dokka/html'
  ASSEMBLE_DIR: '__docs_assembled'
  ASSEMBLE_ARTIFACT: 'assembled.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build docs using Writerside Docker builder
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          artifact: ${{ env.ARTIFACT }}
          docker-version: ${{ env.DOCKER_VERSION }}
          location: docs/pages/libs-watchdog/

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # The build consumes the compiler-plugin-dev-kit convention plugins from mavenLocal.
      - name: Checkout compiler-plugin-dev-kit
        uses: actions/checkout@v5
        with:
          repository: Kotlin/compiler-plugin-dev-kit
          path: compiler-plugin-dev-kit
          token: ${{ secrets.DEV_KIT_TOKEN }}

      # The dev kit pins kotlin-compiler-internal-test-framework 2.4.20-dev-7680, a dev-channel
      # build that has been cleaned up from the Kotlin repositories. 2.4.20-dev-7885 is the
      # bootstrap-channel build the dev kit itself compiles against and is still published.
      # No-op once the dev kit drops the 7680 reference upstream.
      - name: Patch dev-kit to a published Kotlin dev version
        working-directory: compiler-plugin-dev-kit
        run: |
          sed -i 's/2\.4\.20-dev-7680/2.4.20-dev-7885/g' \
            compiler-plugin-runtime/build.gradle.kts \
            template/compiler-plugin/build.gradle.kts
          if [ -d compiler-plugin-runtime/k2420_dev_7680 ]; then
            mv compiler-plugin-runtime/k2420_dev_7680 compiler-plugin-runtime/k2420_dev_7885
          fi

      - name: Publish compiler-plugin-dev-kit to Maven Local
        working-directory: compiler-plugin-dev-kit
        run: |
          ./gradlew -p artifact-transform publishToMavenLocal
          ./gradlew -p plugins publishToMavenLocal
          ./gradlew publishToMavenLocal

      - name: Build Dokka API reference
        run: ./gradlew :dokkaGenerate

      - name: Unzip Writerside artifacts
        run: unzip -O UTF-8 -qq 'artifacts/${{ env.ARTIFACT }}' -d ${{ env.ASSEMBLE_DIR }}

      - name: Add Dokka to the assembled website
        run: |
          mkdir -p ${{ env.ASSEMBLE_DIR }}/api
          cp -r ${{ env.DOKKA_OUTPUT }}/. ${{ env.ASSEMBLE_DIR }}/api/

      - name: Update sitemap.xml
        run: chmod +x scripts/update_sitemap.sh && ./scripts/update_sitemap.sh ${{ env.ASSEMBLE_DIR }}/sitemap.xml ${{ env.ASSEMBLE_DIR }}/api

      - name: Assemble file
        run: cd ${{ env.ASSEMBLE_DIR }} && zip -r ../${{ env.ASSEMBLE_ARTIFACT }} .

      - name: Save artifact with build results
        uses: actions/upload-artifact@v6
        with:
          name: libs-watchdog-docs
          path: |
            artifacts/${{ env.ARTIFACT }}
            artifacts/report.json
          retention-days: 7

      - name: Save assembled artifact
        uses: actions/upload-artifact@v6
        with:
          name: libs-watchdog-docs-assembled
          path: ${{ env.ASSEMBLE_ARTIFACT }}
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: libs-watchdog-docs
          path: artifacts

      - name: Test documentation
        uses: JetBrains/writerside-checker-action@v1
        with:
          instance: ${{ env.INSTANCE }}

  deploy:
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [ build, test ]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: libs-watchdog-docs-assembled

      - name: Unzip artifact
        run: unzip -O UTF-8 -qq '${{ env.ASSEMBLE_ARTIFACT }}' -d publish

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Package and upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
